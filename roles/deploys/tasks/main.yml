- name: Set backend ip and gateway ip from environment
  ansible.builtin.set_fact:
    main_nginx_host_ip_env: "{{ lookup('ansible.builtin.env', 'MAIN_NGINX_HOST_IP', default='') | trim }}"
    front_nginx_host_ip_env: "{{ lookup('ansible.builtin.env', 'FRONT_NGINX_HOST_IP', default='') | trim }}"
    front_nginx_domain_name: "{{ lookup('ansible.builtin.env', 'DOMAIN_NAME', default='') | trim }}"

- name: Ensure nginx host IPs are set before deploying any stack
  ansible.builtin.assert:
    that:
      - front_nginx_host_ip_env | length > 0
      - front_nginx_domain_name | length > 0
      - main_nginx_host_ip_env | length > 0
    fail_msg: DOMAIN_NAME, FRONT_NGINX_HOST_IP (gateway ip) and MAIN_NGINX_HOST_IP (backend ip) must both be exported before deploying

- name: Ensure app dir exists
  ansible.builtin.file:
    path: "/var/tmp/compose/{{ stack_name }}"
    state: directory
    mode: "0755"

- name: Sync stack files with progress
  ansible.posix.synchronize:
    src: "{{ stack_name }}/"
    dest: "/var/tmp/compose/{{ stack_name }}/"
    archive: true
    rsync_opts:
      - "--info=progress2"
  delegate_to: localhost

- name: Fetch Cloudflare IPv4 ranges
  ansible.builtin.uri:
    url: https://www.cloudflare.com/ips-v4
    return_content: true
  register: cloudflare_ips_v4
  when: stack_name == "stack_b"

- name: Fetch Cloudflare IPv6 ranges
  ansible.builtin.uri:
    url: https://www.cloudflare.com/ips-v6
    return_content: true
  register: cloudflare_ips_v6
  when: stack_name == "stack_b"

- name: Put together Cloudflare IPv4 & IPv6 trusted IP ranges
  ansible.builtin.set_fact:
    cloudflare_real_ip_ranges: >-
      {{
        (cloudflare_ips_v4.content.splitlines() + cloudflare_ips_v6.content.splitlines())
        | map('trim')
        | reject('equalto', '')
        | list
      }}
  when: stack_name == "stack_b"

- name: Ensure Cloudflare trusted IP range were fetched
  ansible.builtin.assert:
    that:
      - cloudflare_real_ip_ranges | length > 0
    fail_msg: Failed to fetch Cloudflare IP range before deploying on front host
  when: stack_name == "stack_b"

- name: Compile an nginx include file for trusted Cloudflare IP range
  ansible.builtin.template:
    src: stack_b/nginx/cloudflare_real_ip.inc.template.j2
    dest: /var/tmp/compose/stack_b/nginx/cloudflare_real_ip.inc.template
    mode: "0644"
  when: stack_name == "stack_b"

- name: Stop stack if running
  ansible.builtin.command:
    cmd: docker compose down
    chdir: "/var/tmp/compose/{{ stack_name }}"
  ignore_errors: true

- name: Start stack
  ansible.builtin.command:
    cmd: docker compose up --build -d
    chdir: "/var/tmp/compose/{{ stack_name }}"
  environment:
    MAIN_NGINX_HOST_IP: "{{ main_nginx_host_ip_env }}"
    FRONT_NGINX_HOST_IP: "{{ front_nginx_host_ip_env }}"
    DOMAIN_NAME: "{{ front_nginx_domain_name }}"

- name: Install stack_a geocode cache warmup service
  ansible.builtin.copy:
    dest: /etc/systemd/system/stack_a-geocode-cache-warmup.service
    mode: "0644"
    content: |
      [Unit]
      Description=Warm stack_a geocode cache
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      WorkingDirectory=/var/tmp/compose/stack_a
      ExecStart=/usr/bin/docker compose run --rm --no-deps events-map-webapp python -m libs.geocode_cache_warm_up --from today --days 30
  become: true
  notify: Reload and restart stack_a geocode cache warmup timer
  when: stack_name == "stack_a"

- name: Install stack_a geocode cache warmup timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/stack_a-geocode-cache-warmup.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run stack_a geocode cache warmup daily at midnight

      [Timer]
      OnCalendar=*-*-* 00:00:00
      Persistent=true

      [Install]
      WantedBy=timers.target
  become: true
  notify: Reload and restart stack_a geocode cache warmup timer
  when: stack_name == "stack_a"

- name: Enable stack_a geocode cache warmup timer
  ansible.builtin.systemd:
    name: stack_a-geocode-cache-warmup.timer
    enabled: true
    state: started
  become: true
  when: stack_name == "stack_a"

- name: Warm stack_a geocode cache
  ansible.builtin.command:
    cmd: docker compose run --rm --no-deps events-map-webapp python -m libs.geocode_cache_warm_up --from today --days 30
    chdir: "/var/tmp/compose/{{ stack_name }}"
  register: warm_cache_result
  retries: 12
  delay: 10
  until: warm_cache_result.rc == 0
  when: stack_name == "stack_a"
