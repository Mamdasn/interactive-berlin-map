worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Optimizations for serving static files
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 65;

  limit_req_status 429;
  limit_req_zone $binary_remote_addr zone=html_zone:10m rate=30r/m;

  # Cache configuration for map tiles
  proxy_cache_path /var/cache/nginx/tiles
    levels=1:2
    keys_zone=tiles_cache:100m
    max_size=5g
    inactive=30d
    use_temp_path=off;

  server {
    listen 80;

    # For the main web application
    location = / {
      limit_req zone=html_zone burst=30 nodelay;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://events-map-webapp:8000;
    }

    location /api/ {
      return 404;
    }

    # For map tile requests
    location ^~ /tiles/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      rewrite ^/tiles/(.*)$ /$1 break;

      proxy_cache tiles_cache;

      # Keep separate cache entries per Accept-Encoding variant.
      proxy_cache_key "$scheme$proxy_host$request_uri|ae=$http_accept_encoding";

      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 301 302 30d;
      proxy_cache_valid 404 1h;

      add_header X-Tile-Cache $upstream_cache_status always;

      proxy_pass http://tileserver:8080;
    }

    # Catch-all for other paths
    location / {
      return 404;
    }
  }
}
