<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>429 - The Oracle Speaks</title>

<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
        --accent: #f87171;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1rem;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
    }

    .card {
        background: var(--card);
        padding: clamp(1.5rem, 5vw, 3rem);
        border-radius: 20px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        width: 100%;
        max-width: 480px;
        animation: fadeIn 0.6s ease-out;
    }

    h1 {
        margin: 0 0 1rem 0;
        font-size: clamp(1.5rem, 6vw, 2rem);
        color: var(--accent);
        line-height: 1.2;
    }

    #reason {
        font-size: clamp(1rem, 4.5vw, 1.25rem);
        min-height: 1.8em;
        margin: 1rem 0 2rem;
        transition: opacity 0.3s ease;
        word-wrap: break-word;
    }

    .dots::after {
        content: "";
        animation: dots 1.4s steps(3, end) infinite;
    }

    @keyframes dots {
        0% { content: ""; }
        33% { content: "."; }
        66% { content: ".."; }
        100% { content: "..."; }
    }

    button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.9rem 1.5rem;
        font-size: 1rem;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
        max-width: 220px;
        transition: transform 0.1s ease, opacity 0.2s ease;
    }

    button:active {
        transform: scale(0.96);
    }

    button:hover {
        opacity: 0.9;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
        .card {
            border-radius: 14px;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>429 — Too Many Requests</h1>
    <p id="reason" class="dots">Consulting the No oracle</p>
    <button onclick="location.reload()">Try Again</button>
</div>

<script>
    fetch("https://naas.isalman.dev/no")
        .then(response => response.json())
        .then(data => {
            const reason = document.getElementById("reason");
            reason.classList.remove("dots");
            reason.style.opacity = 0;
            setTimeout(() => {
                reason.textContent = data.reason;
                reason.style.opacity = 1;
            }, 200);
        })
        .catch(() => {
            const reason = document.getElementById("reason");
            reason.classList.remove("dots");
            reason.textContent = "Even the oracle refuses to answer.";
        });
</script>

</body>
</html>
